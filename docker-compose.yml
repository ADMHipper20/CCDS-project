version: "3.8"

services:
  app:
    image: laravel-filament-app:latest
    volumes:
      - .:/var/www
    networks:
      - laravel
    environment:
      - DUSK_DRIVER_URL=http://selenium:4444/wd/hub
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  nginx-web:
    image: nginx:alpine
    volumes:
      - .:/var/www
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    depends_on:
      - app
    networks:
      - laravel
    deploy:
      replicas: 2

  nginx-api:
    image: nginx:alpine
    volumes:
      - .:/var/www
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8001:80"
    depends_on:
      - app
    networks:
      - laravel
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  selenium:
    image: selenium/standalone-chrome:latest
    networks:
      - laravel
    volumes:
      - /dev/shm:/dev/shm # Prevents browser crashes
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
  
  mysql:
    image: mysql:latest
    expose: 
      - "3306"
    environment:
      MYSQL_DATABASE: bakery
      # MYSQL_USER: root
      # MYSQL_PASSWORD: rootpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laravel
    deploy:
      replicas: 1

networks:
  laravel:
    driver: overlay

volumes:
  mysql-data:
